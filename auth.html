<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — QUIZTOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #0f1c28; color: #e2e8f0; font-family: sans-serif; }
        .auth-card { background: #1a2a3a; border: 1px solid #2b3d50; }
        .btn-primary { background: #d35444; transition: 0.2s; }
        .btn-primary:hover { background: #ef4444; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="auth-card w-full max-w-md p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-10">
            <a href="index.html" class="text-5xl font-black tracking-tighter text-white uppercase">
                QUIZ<span class="text-[#d35444]">TOS</span>
            </a>
            <p class="text-slate-400 mt-4 text-sm">Enter your email to receive a login link</p>
        </div>

        <div id="auth-ui" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" 
                    class="w-full bg-[#0f1c28] border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-[#d35444] transition">
            </div>
            
            <button onclick="loginWithEmail()" id="login-btn" class="w-full btn-primary text-white font-bold py-3 rounded-lg shadow-lg">
                Send Magic Link
            </button>
            
            <p id="msg" class="text-sm text-center mt-4 min-h-[20px]"></p>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-xs text-slate-500 hover:text-white transition uppercase font-bold tracking-widest">← Back to home</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xtwvtzqvpmwhytcegcxg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0d3Z0enF2cG13aHl0Y2VnY3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzA1MDUsImV4cCI6MjA4OTMwNjUwNX0.Y1_F90eol6VgtZvhL-LuXLuKGRZHU4CgczkZG0HP_gQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loginWithEmail() {
            const emailInput = document.getElementById('email');
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('msg');
            const email = emailInput.value.trim();

            if (!email) {
                alert("Please enter your email");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            msg.innerText = "";

            const { error } = await supabaseClient.auth.signInWithOtp({
                email: email,
                options: {
                    // Ссылка вернет пользователя в профиль после клика в письме
                    emailRedirectTo: window.location.origin + '/profile.html'
                }
            });

            if (error) {
                msg.classList.add('text-red-500');
                msg.innerText = "Error: " + error.message;
                btn.disabled = false;
                btn.innerText = "Send Magic Link";
            } else {
                msg.classList.remove('text-red-500');
                msg.classList.add('text-green-400');
                msg.innerText = "Check your email! We sent you a login link.";
                emailInput.value = "";
                btn.innerText = "Link Sent!";
            }
        }
    </script>
</body>
</html>
